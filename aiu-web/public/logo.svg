<svg xmlns="http://www.w3.org/2000/svg" viewBox="110 70 380 380" width="100%" height="100%">
  <defs>
    <!-- Brain / Wave Gradient - Royal Blue to Ice Blue to Pure White -->
    <linearGradient id="brain-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="78%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>

  <!-- Head / Brain Soundwave representation -->
  <!-- A series of vertical bars forming a side profile of a head/brain facing right -->
  <g fill="url(#brain-grad)">
    <!-- Back of neck / head -->
    <rect x="200" y="320" width="8" height="60" rx="4" />
    <rect x="216" y="270" width="8" height="120" rx="4" />
    <rect x="232" y="200" width="8" height="200" rx="4" />
    <rect x="248" y="160" width="8" height="250" rx="4" />
    <rect x="264" y="130" width="8" height="290" rx="4" />
    <rect x="280" y="110" width="8" height="310" rx="4" />
    
    <!-- Center brain area -->
    <rect x="296" y="100" width="8" height="320" rx="4" />
    <rect x="312" y="100" width="8" height="310" rx="4" />
    <rect x="328" y="110" width="8" height="280" rx="4" />
    <rect x="344" y="125" width="8" height="250" rx="4" />
    
    <!-- Face structure (forehead, nose, lips, chin) -->
    <rect x="360" y="140" width="8" height="200" rx="4" /> <!-- Conjoined bar x=360 -->
    <rect x="376" y="150" width="8" height="160" rx="4" /> <!-- Conjoined bar x=376 -->
    <rect x="388" y="180" width="8" height="80" rx="4" /> <!-- Conjoined nose & lips bar (x=388) -->
  </g>
</svg>